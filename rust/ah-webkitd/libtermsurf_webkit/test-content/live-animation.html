<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TermSurf Live Compositor A</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #07111f;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #07111f;
      }

      header {
        height: 72px;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #101827;
        border-bottom: 4px solid #334155;
      }

      #control {
        width: 180px;
        height: 36px;
        display: grid;
        place-items: center;
        color: #0f172a;
        background: #e2e8f0;
      }

      #counter {
        min-width: 190px;
        text-align: right;
        color: #67e8f9;
        font-size: 24px;
      }

      #stage {
        position: relative;
        height: calc(100vh - 72px);
        min-height: 360px;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgb(15 23 42 / 80%) 1px, transparent 1px) 0 0 / 40px 40px,
          linear-gradient(rgb(15 23 42 / 80%) 1px, transparent 1px) 0 0 / 40px 40px,
          #07111f;
      }

      #runner {
        position: absolute;
        left: 36px;
        top: 56px;
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
        background: #22d3ee;
        color: #082f49;
        font-size: 54px;
        font-weight: 900;
        box-shadow: 0 0 36px #22d3ee;
        animation: sweep 1.75s linear infinite alternate;
      }

      @keyframes sweep {
        from {
          transform: translateX(0) rotate(0deg);
          background: #22d3ee;
        }
        to {
          transform: translateX(min(58vw, 520px)) rotate(270deg);
          background: #a3e635;
        }
      }

      #hover-target {
        position: absolute;
        left: 48px;
        bottom: 48px;
        width: 260px;
        height: 92px;
        display: grid;
        place-items: center;
        background: #db2777;
        border: 6px solid #f9a8d4;
        color: white;
        font-size: 22px;
        cursor: pointer;
        transition: none;
      }

      #hover-target:hover {
        background: #facc15;
        border-color: #fef08a;
        color: #422006;
      }

      #next {
        position: absolute;
        right: 48px;
        bottom: 48px;
        padding: 22px 28px;
        background: #7c3aed;
        color: white;
        font-size: 20px;
      }
    </style>
  </head>
  <body data-page="a" data-visibility="visible">
    <header>
      <div id="control">STATIC CONTROL A</div>
      <output id="counter">rAF 000000</output>
    </header>
    <main id="stage">
      <div id="runner" aria-label="animated runner">A</div>
      <div id="hover-target">HOVER WITHOUT CLICK</div>
      <a id="next" href="/live-animation-2.html">NAVIGATE TO PAGE B</a>
    </main>
    <script>
      const counter = document.querySelector("#counter");
      let frames = 0;
      const tick = () => {
        frames += 1;
        window.__termsurfRafCount = frames;
        counter.value = `rAF ${String(frames).padStart(6, "0")}`;
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);

      document.querySelector("#next").href =
        `http://localhost:${location.port}/live-animation-2.html`;

      const reportVisibility = () => {
        document.body.dataset.visibility = document.visibilityState;
        console.log(`termsurf-visibility:${document.visibilityState}:${frames}`);
        fetch(`/visibility?state=${document.visibilityState}&page=a&frames=${frames}`, {
          cache: "no-store",
        }).catch(() => {});
      };
      document.addEventListener("visibilitychange", reportVisibility);
      reportVisibility();
    </script>
  </body>
</html>
