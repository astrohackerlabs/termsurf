<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cookie Persistence Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1b26;
  color: #c0caf5;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 24px;
}
h1 { color: #7aa2f7; font-size: 28px; }
.count { font-size: 96px; color: #7dcfff; font-weight: bold; }
.label { color: #565f89; font-size: 18px; }
.status { color: #9ece6a; font-size: 16px; max-width: 500px; text-align: center; line-height: 1.6; }
.fail { color: #f7768e; }
button {
  background: #24283b;
  color: #c0caf5;
  border: 1px solid #565f89;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: #414868; }
</style>
</head>
<body>
<h1>Cookie Persistence Test</h1>
<div class="count" id="count">-</div>
<div class="label">visit count</div>
<div class="status" id="status"></div>
<button onclick="resetCookie()">Reset Counter</button>

<script>
function getCookie(name) {
  var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function setCookie(name, value, days) {
  var expires = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
}

function resetCookie() {
  document.cookie = 'ts_visit_count=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
  location.reload();
}

var prev = getCookie('ts_visit_count');
var count = prev ? parseInt(prev, 10) + 1 : 1;
setCookie('ts_visit_count', count, 365);

document.getElementById('count').textContent = count;

var el = document.getElementById('status');
if (count === 1) {
  el.textContent = 'Cookie set. Quit Roamium, reopen, and reload this page. If the count increases, cookies persist.';
} else {
  el.textContent = 'Cookies are persisting! This is visit #' + count + '.';
}
</script>
</body>
</html>
