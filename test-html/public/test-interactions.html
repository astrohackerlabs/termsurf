<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Interaction Harness Test</title>
    <style>
      body {
        margin: 0;
        background: #f6f7fb;
        color: #1b1f2a;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #24324a;
        color: white;
        padding: 18px 24px;
      }

      main {
        padding: 24px;
      }

      button,
      input {
        font: inherit;
        padding: 10px 12px;
      }

      #counter {
        display: inline-block;
        min-width: 48px;
        font-size: 28px;
        font-weight: 700;
        margin-left: 12px;
      }

      .selection-target {
        margin: 28px 0;
        max-width: 760px;
        font-size: 20px;
        line-height: 1.55;
      }

      .spacer {
        height: 1700px;
        border: 2px dashed #a6b0c2;
        background: linear-gradient(#ffffff, #dce6f7);
        display: flex;
        align-items: end;
        padding: 24px;
        box-sizing: border-box;
      }

      #event-log {
        margin-top: 24px;
        padding: 12px;
        min-height: 120px;
        background: #101722;
        color: #d7e5ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Interaction Harness Test</strong>
      <span id="scroll-state">scrollY=0</span>
    </header>
    <main>
      <button id="click-target">Click target</button>
      <span id="counter">0</span>
      <p class="selection-target" id="selection-target">
        This sentence exists so automated drag selection can prove that mouse
        movement, focus, selection, and clipboard checks work on ordinary HTML
        before the PDF-specific checks are trusted.
      </p>
      <input id="focus-target" placeholder="focus target" />
      <div class="spacer">
        <strong id="bottom-marker">Bottom marker reached</strong>
      </div>
      <div id="event-log"></div>
    </main>
    <script>
      const counter = document.getElementById("counter");
      const log = document.getElementById("event-log");
      const scrollState = document.getElementById("scroll-state");
      let count = 0;

      function addLog(message) {
        log.textContent += `${message}\n`;
      }

      document.getElementById("click-target").addEventListener("click", () => {
        count += 1;
        counter.textContent = String(count);
        addLog(`click count=${count}`);
      });

      for (const type of ["mousedown", "mousemove", "mouseup", "click"]) {
        document.addEventListener(type, (event) => {
          addLog(
            `${type} x=${Math.round(event.clientX)} y=${Math.round(event.clientY)} target=${event.target.id || event.target.tagName}`,
          );
        });
      }

      window.addEventListener("scroll", () => {
        scrollState.textContent = `scrollY=${Math.round(window.scrollY)}`;
      });
    </script>
  </body>
</html>
